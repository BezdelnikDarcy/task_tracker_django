{% extends "base.html" %}
{% load static %}
{% block content %}

<table class="table table-dark table-hover">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">Users</th>
      <th scope="col">Age</th>
      <th scope="col">Images</th>
    </tr>
  </thead>
  <tbody>
  {% for user in users %}
    <tr>
      <th scope="row">{{user.id}}</th>
      <td>{{user.name}}</td>
      <td>{{user.age}}</td>
      <td><img src="{% static user.name|add:'.jpg' %}" alt="{{ user.name }}" width = "100px" height = weidth*1.6></td>
    </tr>
{% endfor %}
  </tbody>
</table>
{% endblock %}
